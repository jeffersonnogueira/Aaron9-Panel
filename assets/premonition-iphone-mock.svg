<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 880" role="img" aria-labelledby="title desc">
  <title id="title">Premonition app iPhone mockup</title>
  <desc id="desc">A dark iPhone-style mockup showing the Premonition app with sample market signals and mock data.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111118"/>
      <stop offset="0.52" stop-color="#161625"/>
      <stop offset="1" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#343440"/>
      <stop offset="0.46" stop-color="#14141a"/>
      <stop offset="1" stop-color="#030307"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#14141f"/>
      <stop offset="1" stop-color="#08080d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1b1b28"/>
      <stop offset="1" stop-color="#111118"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="760" height="880" rx="36" fill="url(#bg)"/>
  <circle cx="175" cy="150" r="95" fill="#5DCAA5" opacity="0.13" filter="url(#soft)"/>
  <circle cx="595" cy="690" r="125" fill="#7F77DD" opacity="0.12" filter="url(#soft)"/>
  <circle cx="585" cy="170" r="82" fill="#EF9F27" opacity="0.10" filter="url(#soft)"/>

  <g filter="url(#shadow)">
    <rect x="215" y="55" width="330" height="730" rx="58" fill="url(#phone)"/>
    <rect x="229" y="70" width="302" height="700" rx="45" fill="#050508"/>
    <rect x="238" y="82" width="284" height="676" rx="38" fill="url(#screen)"/>
    <rect x="329" y="94" width="102" height="27" rx="14" fill="#050508"/>

    <g transform="translate(260 135)">
      <text x="0" y="0" fill="#f0f0f5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="650">Premonition</text>
      <text x="0" y="24" fill="#888899" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12">Live signal console</text>
      <rect x="174" y="-20" width="62" height="28" rx="14" fill="rgba(93,202,165,0.16)" stroke="#5DCAA5" stroke-opacity="0.38"/>
      <text x="190" y="-2" fill="#5DCAA5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="650">MOCK</text>
    </g>

    <g transform="translate(260 190)">
      <rect x="0" y="0" width="240" height="122" rx="22" fill="url(#card)" stroke="rgba(255,255,255,0.10)"/>
      <text x="18" y="28" fill="#888899" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12">Portfolio Pulse</text>
      <text x="18" y="64" fill="#f0f0f5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="34" font-weight="700">+68%</text>
      <text x="18" y="88" fill="#5DCAA5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600">trend confidence</text>
      <path d="M126 87 C145 50 164 72 181 42 C196 16 211 30 226 18" fill="none" stroke="#5DCAA5" stroke-width="5" stroke-linecap="round"/>
      <path d="M126 104 C145 67 164 89 181 59 C196 33 211 47 226 35" fill="none" stroke="#7F77DD" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
      <circle cx="226" cy="18" r="5" fill="#FAC775"/>
    </g>

    <g transform="translate(260 332)">
      <text x="0" y="0" fill="#f0f0f5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="650">Today signals</text>
      <g transform="translate(0 18)">
        <rect x="0" y="0" width="240" height="58" rx="17" fill="#111118" stroke="rgba(255,255,255,0.08)"/>
        <text x="16" y="24" fill="#f0f0f5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700">SPY</text>
        <text x="16" y="43" fill="#888899" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">Bullish pressure</text>
        <text x="142" y="24" fill="#5DCAA5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">+1.8%</text>
        <rect x="191" y="14" width="34" height="24" rx="12" fill="rgba(93,202,165,0.15)"/>
        <text x="199" y="31" fill="#5DCAA5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="700">72</text>
      </g>
      <g transform="translate(0 88)">
        <rect x="0" y="0" width="240" height="58" rx="17" fill="#111118" stroke="rgba(255,255,255,0.08)"/>
        <text x="16" y="24" fill="#f0f0f5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700">NVDA</text>
        <text x="16" y="43" fill="#888899" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">Momentum burst</text>
        <text x="142" y="24" fill="#5DCAA5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">+3.4%</text>
        <rect x="191" y="14" width="34" height="24" rx="12" fill="rgba(93,202,165,0.15)"/>
        <text x="199" y="31" fill="#5DCAA5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="700">81</text>
      </g>
      <g transform="translate(0 158)">
        <rect x="0" y="0" width="240" height="58" rx="17" fill="#111118" stroke="rgba(255,255,255,0.08)"/>
        <text x="16" y="24" fill="#f0f0f5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700">BTC</text>
        <text x="16" y="43" fill="#888899" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">Risk-on setup</text>
        <text x="142" y="24" fill="#FAC775" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="700">+2.1%</text>
        <rect x="191" y="14" width="34" height="24" rx="12" fill="rgba(239,159,39,0.16)"/>
        <text x="199" y="31" fill="#FAC775" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="700">64</text>
      </g>
    </g>

    <g transform="translate(260 590)">
      <rect x="0" y="0" width="240" height="70" rx="20" fill="rgba(127,119,221,0.13)" stroke="rgba(127,119,221,0.34)"/>
      <text x="16" y="26" fill="#AFA9EC" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="650">Next alert window</text>
      <text x="16" y="52" fill="#f0f0f5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="700">09:30 - 10:15 ET</text>
      <circle cx="208" cy="35" r="18" fill="#7F77DD" opacity="0.26"/>
      <path d="M201 35 L207 41 L218 29" fill="none" stroke="#AFA9EC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(274 707)">
      <rect x="0" y="0" width="212" height="34" rx="17" fill="#101018" stroke="rgba(255,255,255,0.07)"/>
      <text x="24" y="22" fill="#5DCAA5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="700">Signals</text>
      <text x="92" y="22" fill="#777787" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">Alerts</text>
      <text x="150" y="22" fill="#777787" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">AIM</text>
    </g>
  </g>
</svg>
